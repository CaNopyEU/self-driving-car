<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Highway Dodger</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230d1117'/><rect x='5' y='3' width='6' height='10' rx='2' fill='%232980ff'/></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="menu" class="overlay">
        <div class="panel">
            <h1>HIGHWAY<br>DODGER</h1>
            <p class="tag">Outrun the traffic. Don't blink.</p>
            <ul class="rules">
                <li><b>↑/W</b> accelerate &nbsp; <b>↓/S</b> brake</li>
                <li><b>←/→ or A/D</b> steer</li>
                <li>Overtake cars <b>+50</b> · Near misses <b>+25</b></li>
                <li>Chain them for <b>combos</b></li>
                <li>Level 3+: <span class="elite">elite drivers</span> dodge you back</li>
            </ul>
            <button id="startBtn">START &nbsp;⏎</button>
            <p id="menuBest" class="best"></p>
        </div>
    </div>

    <div id="gameover" class="overlay hidden">
        <div class="panel">
            <h1 class="crash">CRASHED</h1>
            <p id="finalStats"></p>
            <button id="restartBtn">DRIVE AGAIN &nbsp;⏎</button>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="network.js"></script>
    <script src="sensor.js"></script>
    <script src="controls.js"></script>
    <script src="road.js"></script>
    <script src="car.js"></script>
    <script src="game.js"></script>
</body>
</html>
