<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slipstream Survivor</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas" aria-label="Slipstream Survivor game canvas"></canvas>

    <div id="uiLayer">
        <div id="banner" class="hidden"></div>

        <div id="screen" class="screen">
            <div class="screen-card">
                <p id="screenEyebrow" class="screen-eyebrow">Arcade Highway Run</p>
                <h1 id="screenTitle">Slipstream Survivor</h1>
                <p id="screenLead" class="screen-lead">Thread impossible traffic, chain near misses, and burn boost to survive ever nastier waves.</p>
                <div id="screenStats" class="screen-stats"></div>
                <button id="primaryButton" type="button">Start Run</button>
                <p id="screenHint" class="screen-hint">Arrows or WASD steer. Up accelerates. Down brakes. Space boosts. P pauses.</p>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="road.js"></script>
    <script src="controls.js"></script>
    <script src="car.js"></script>
    <script src="main.js"></script>
</body>
</html>
