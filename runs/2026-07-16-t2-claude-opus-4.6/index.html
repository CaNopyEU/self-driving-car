<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" href="data:,">
<title>Highway Dodger 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;background:#000;font-family:monospace}
#c{width:100%;height:100%;display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;color:#fff}
#score{position:absolute;top:20px;right:30px;font-size:28px;display:none;text-shadow:0 0 6px #000}
#start{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);pointer-events:auto}
#start h1{font-size:48px;margin-bottom:20px;color:#0ff}
#start p{font-size:18px;margin:4px 0;color:#ccc}
#start .sub{margin-top:20px;font-size:14px;color:#888}
#gameover{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);pointer-events:auto}
#gameover h2{font-size:40px;color:#f44;margin-bottom:10px}
#gameover p{font-size:24px;margin:6px 0}
#gameover .sub{margin-top:20px;font-size:14px;color:#888}
#powerup-indicator{position:absolute;top:60px;right:30px;font-size:18px;display:none;color:#ff0;text-shadow:0 0 6px #000}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="score">Score: 0</div>
  <div id="powerup-indicator"></div>
  <div id="start">
    <h1>Highway Dodger 3D</h1>
    <p>Dodge traffic, survive as long as you can!</p>
    <p>Controls: Arrow Keys or WASD to steer</p>
    <p class="sub">Press any key or click to start</p>
  </div>
  <div id="gameover">
    <h2>GAME OVER</h2>
    <p id="final-score">Score: 0</p>
    <p class="sub">Press any key or click to restart</p>
  </div>
</div>
<script src="three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
