<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Retro Highway</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="carCanvas"></canvas>
        <div id="uiOverlay">
            <div id="startScreen" class="screen">
                <h1>RETRO HIGHWAY</h1>
                <p>Use ARROW KEYS to drive.</p>
                <p>Avoid traffic and survive!</p>
                <button id="startBtn">START GAME</button>
            </div>
            <div id="gameOverScreen" class="screen hidden">
                <h1>CRASHED!</h1>
                <p>Score: <span id="finalScore"></span></p>
                <p>High Score: <span id="highScore"></span></p>
                <button id="restartBtn">TRY AGAIN</button>
            </div>
            <div id="hud" class="hidden">
                <div class="hud-item">Score: <span id="scoreVal">0</span></div>
                <div class="hud-item">Level: <span id="levelVal">1</span></div>
                <div class="hud-item">Speed: <span id="speedVal">0</span></div>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="road.js"></script>
    <script src="controls.js"></script>
    <script src="car.js"></script>
    <script src="main.js"></script>
</body>
</html>
