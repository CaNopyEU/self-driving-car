<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Neon Highway</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(5, 5, 16, 0.8);
            pointer-events: auto;
            transition: opacity 0.3s;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        h1 {
            font-size: 4rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #f0f, 0 0 20px #f0f;
            color: #fff;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5), inset 0 0 10px rgba(0, 255, 255, 0.3);
        }
        button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8), inset 0 0 15px rgba(0, 255, 255, 0.5);
            text-shadow: 0 0 5px #fff;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 5px #0ff;
        }
        .hud-val {
            font-size: 2rem;
            color: #0ff;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="hud">
            <div>SCORE: <span id="score" class="hud-val">0</span></div>
            <div>HI-SCORE: <span id="hi-score" class="hud-val">0</span></div>
            <div>LEVEL: <span id="level" class="hud-val">1</span></div>
        </div>

        <div id="start-screen" class="screen">
            <h1>Neon Highway</h1>
            <p>Use LEFT / RIGHT arrow keys or A / D to steer. Dodge the obstacles.</p>
            <button id="start-btn">Start Engine</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1>Wasted</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
