<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endless Highway</title>
<style>
  body, html { margin: 0; padding: 0; overflow: hidden; background: #222; font-family: sans-serif; color: white; user-select: none; }
  canvas { display: block; margin: 0 auto; background: #333; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
  #startScreen, #gameOverScreen { background: rgba(0,0,0,0.85); padding: 30px; border-radius: 10px; text-align: center; pointer-events: auto; cursor: pointer; border: 2px solid #555; }
  #hud { position: absolute; top: 15px; left: 15px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000; z-index: 5; }
  .hidden { display: none !important; }
  h1 { margin-top: 0; color: #ffeb3b; font-size: 36px; text-transform: uppercase; letter-spacing: 2px; }
  p { font-size: 18px; line-height: 1.5; margin: 10px 0; color: #ddd; }
  .pulse { animation: pulse 1.5s infinite; color: #fff; font-weight: bold; margin-top: 20px; }
  @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="startScreen">
    <h1>Endless Highway</h1>
    <p>Steer with <b>Arrow Keys</b> or <b>WASD</b></p>
    <p>Avoid the red cars!</p>
    <p>Collect blue orbs for a shield!</p>
    <p class="pulse">Click or press any key to start</p>
  </div>
  <div id="gameOverScreen" class="hidden">
    <h1>Crash!</h1>
    <p>Score: <span id="finalScore" style="color:#ffeb3b; font-size:24px; font-weight:bold;">0</span></p>
    <p>High Score: <span id="highScore">0</span></p>
    <p class="pulse">Click or press any key to restart</p>
  </div>
</div>
<div id="hud" class="hidden">Score: <span id="scoreDisplay">0</span></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 400;
canvas.height = window.innerHeight;

let storageHigh = 0;
try { storageHigh = parseInt(localStorage.getItem('highScore')) || 0; } catch (e) {}

let audioCtx;
function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.warn("AudioContext not supported");
    }
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playSound(type) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'crash') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    } else if (type === 'blip') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'powerup') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }
  } catch (e) {}
}

let state = 'START'; 
let score = 0;
let distance = 0;
let speed = 5;
let spawnRate = 60; 
let frameCount = 0;
let shakeTime = 0;
let nextScoreBlip = 100;

let player = { x: 0, y: 0, w: 40, h: 70, speed: 7, shield: 0 };
let obstacles = [];
let powerups = [];
let particles = [];

let keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state === 'START' || state === 'GAMEOVER') startGame();
});
window.addEventListener('keyup', e => keys[e.key] = false);

document.getElementById('startScreen').addEventListener('mousedown', startGame);
document.getElementById('gameOverScreen').addEventListener('mousedown', startGame);
window.addEventListener('mousedown', () => {
  if (state === 'START' || state === 'GAMEOVER') startGame();
});

function startGame() {
  initAudio();
  if (state === 'PLAYING') return;
  state = 'PLAYING';
  score = 0;
  distance = 0;
  speed = 6;
  spawnRate = 50;
  frameCount = 0;
  shakeTime = 0;
  nextScoreBlip = 100;
  
  player.x = canvas.width / 2 - player.w / 2;
  player.y = canvas.height - 120;
  player.shield = 0;
  obstacles = [];
  powerups = [];
  particles = [];
  
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('scoreDisplay').innerText = '0';
}

function spawnObstacle() {
  let w = 40, h = 70;
  let x = Math.random() * (canvas.width - w);
  let y = -h - Math.random() * 50;
  obstacles.push({x, y, w, h});
}

function spawnPowerup() {
  let r = 15;
  let x = Math.random() * (canvas.width - r*2) + r;
  let y = -r;
  powerups.push({x, y, r, type: 'shield'});
}

function createExplosion(x, y, colorType = 'fire') {
  for (let i = 0; i < 25; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12,
      life: 20 + Math.random() * 30,
      color: colorType === 'fire' 
        ? (Math.random() > 0.5 ? '#ff0000' : '#ffaa00') 
        : '#00ffff'
    });
  }
}

function gameOver() {
  state = 'GAMEOVER';
  playSound('crash');
  createExplosion(player.x + player.w/2, player.y + player.h/2, 'fire');
  shakeTime = 25;
  
  document.getElementById('gameOverScreen').classList.remove('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('finalScore').innerText = Math.floor(score);
  
  try {
    let high = parseInt(localStorage.getItem('highScore')) || 0;
    if (score > high) {
      high = score;
      localStorage.setItem('highScore', high);
    }
    document.getElementById('highScore').innerText = Math.floor(high);
  } catch (e) {
    document.getElementById('highScore').innerText = Math.floor(score) + " (Storage unavailable)";
  }
}

function update() {
  if (state !== 'PLAYING') {
    updateParticles();
    return;
  }

  frameCount++;
  
  if (frameCount % 600 === 0) {
    speed += 1.5;
    spawnRate = Math.max(15, spawnRate - 8);
  }

  distance += speed * 0.04;
  score = distance;
  document.getElementById('scoreDisplay').innerText = Math.floor(score);
  
  if (score >= nextScoreBlip) {
    playSound('blip');
    nextScoreBlip += 100;
  }

  if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed;

  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));
  
  if (player.shield > 0) player.shield--;

  if (frameCount % spawnRate === 0) spawnObstacle();
  if (frameCount % 400 === 0 && Math.random() > 0.4) spawnPowerup();

  for (let i = obstacles.length - 1; i >= 0; i--) {
    let obs = obstacles[i];
    obs.y += speed * 0.75; 
    if (obs.y > canvas.height) {
      obstacles.splice(i, 1);
      continue;
    }
    
    if (
      player.x < obs.x + obs.w - 5 &&
      player.x + player.w > obs.x + 5 &&
      player.y < obs.y + obs.h - 5 &&
      player.y + player.h > obs.y + 5
    ) {
      if (player.shield > 0) {
        obstacles.splice(i, 1);
        playSound('crash');
        createExplosion(obs.x + obs.w/2, obs.y + obs.h/2, 'fire');
      } else {
        gameOver();
      }
    }
  }

  for (let i = powerups.length - 1; i >= 0; i--) {
    let p = powerups[i];
    p.y += speed * 0.8;
    if (p.y > canvas.height + p.r) {
      powerups.splice(i, 1);
      continue;
    }
    
    let px = Math.max(player.x, Math.min(p.x, player.x + player.w));
    let py = Math.max(player.y, Math.min(p.y, player.y + player.h));
    let dist = Math.hypot(p.x - px, p.y - py);
    if (dist < p.r + 5) {
      player.shield = 420; 
      playSound('powerup');
      createExplosion(player.x + player.w/2, player.y + player.h/2, 'shield');
      powerups.splice(i, 1);
    }
  }

  updateParticles();
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function draw() {
  ctx.fillStyle = '#333';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  if (shakeTime > 0) {
    let dx = (Math.random() - 0.5) * 12;
    let dy = (Math.random() - 0.5) * 12;
    ctx.translate(dx, dy);
    shakeTime--;
  }

  ctx.fillStyle = '#666';
  ctx.fillRect(10, 0, 10, canvas.height);
  ctx.fillRect(canvas.width - 20, 0, 10, canvas.height);

  ctx.fillStyle = '#fff';
  let offset = (frameCount * speed) % 60;
  for (let i = -60; i < canvas.height; i += 60) {
    ctx.fillRect(canvas.width / 2 - 3, i + offset, 6, 30);
  }

  if (state === 'PLAYING' || state === 'START') {
    ctx.fillStyle = '#0f0';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    
    ctx.fillStyle = '#000';
    ctx.fillRect(player.x + 5, player.y + 10, player.w - 10, 15);
    ctx.fillRect(player.x + 5, player.y + player.h - 25, player.w - 10, 15);

    if (player.shield > 0) {
      ctx.strokeStyle = `rgba(0, 255, 255, ${0.5 + Math.sin(frameCount * 0.2) * 0.5})`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(player.x + player.w/2, player.y + player.h/2, Math.max(player.w, player.h) * 0.8, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  for (let obs of obstacles) {
    ctx.fillStyle = '#f00';
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    ctx.fillStyle = '#000';
    ctx.fillRect(obs.x + 5, obs.y + 10, obs.w - 10, 15);
    ctx.fillRect(obs.x + 5, obs.y + obs.h - 25, obs.w - 10, 15);
  }

  for (let p of powerups) {
    ctx.fillStyle = '#00ffff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(p.x - p.r*0.3, p.y - p.r*0.3, p.r*0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  for (let p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 50;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1.0;
  }

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

draw();
requestAnimationFrame(loop);

window.addEventListener('resize', () => {
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
