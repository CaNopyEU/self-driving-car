<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Highway Dasher 3D</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23222'/%3E%3Crect x='5' y='3' width='6' height='10' fill='%23f33'/%3E%3C/svg%3E">
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;font-family:system-ui,sans-serif;color:#fff;}
  #c{display:block;width:100vw;height:100vh;}
  #ui{position:fixed;top:10px;left:12px;font-size:22px;text-shadow:0 1px 3px #000;pointer-events:none;}
  #pu{position:fixed;top:44px;left:12px;font-size:16px;color:#7cf;text-shadow:0 1px 3px #000;pointer-events:none;}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.55);text-align:center;padding:20px;}
  .overlay h1{font-size:44px;margin:0 0 12px;}
  .overlay p{margin:6px 0;font-size:18px;}
  .overlay button{margin-top:16px;padding:10px 22px;font-size:18px;background:#2a8;color:#fff;border:0;border-radius:6px;cursor:pointer;}
  .hidden{display:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui" class="hidden"><div id="score">0</div></div>
<div id="pu" class="hidden"></div>
<div id="start" class="overlay">
  <h1>HIGHWAY DASHER 3D</h1>
  <p>Dodge traffic. Survive. Grab shields.</p>
  <p>Steer: Arrow Keys or A / D &nbsp; &middot; &nbsp; Accelerate/Brake: W / S or Up / Down</p>
  <p>Blue cube = Shield power-up (temporary invincibility)</p>
  <button id="startBtn">START</button>
  <p style="opacity:.7;font-size:14px;margin-top:18px;">Click or press any key to begin</p>
</div>
<div id="over" class="overlay hidden">
  <h1>GAME OVER</h1>
  <p>Final Score: <span id="final">0</span></p>
  <button id="againBtn">RESTART</button>
  <p style="opacity:.7;font-size:14px;">Press R or click Restart</p>
</div>
<script src="three.min.js"></script>
<script>
"use strict";
// storage guard - never touch storage; if some lib does, ignore.
(function(){try{Object.defineProperty(window,'_ss',{value:null});}catch(e){}})();

var THREE_ = window.THREE;
var canvas = document.getElementById('c');
var scoreEl = document.getElementById('score');
var puEl = document.getElementById('pu');
var uiEl = document.getElementById('ui');
var startEl = document.getElementById('start');
var overEl = document.getElementById('over');
var finalEl = document.getElementById('final');

var renderer, scene, camera, playerCar, road, obstacles = [], powerups = [];
var keys = {};
var state = 'start'; // 'start' | 'play' | 'over'
var score = 0, speed = 40, baseSpeed = 40, elapsed = 0;
var spawnTimer = 0, puTimer = 0;
var shakeT = 0, shakeAmp = 0;
var shieldT = 0;
var laneX = [-4, 0, 4];
var roadWidth = 12;
var playerZ = 0;

// Audio (WebAudio, generated)
var audioCtx = null;
function ensureAudio(){
  if(audioCtx) return audioCtx;
  try{
    var AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    audioCtx = new AC();
  }catch(e){ audioCtx = null; }
  return audioCtx;
}
var engineOsc = null, engineGain = null;
function startEngine(){
  var a = ensureAudio(); if(!a) return;
  try{
    if(engineOsc) return;
    engineOsc = a.createOscillator();
    engineGain = a.createGain();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 60;
    engineGain.gain.value = 0.04;
    engineOsc.connect(engineGain).connect(a.destination);
    engineOsc.start();
  }catch(e){}
}
function stopEngine(){
  try{ if(engineOsc){ engineOsc.stop(); engineOsc.disconnect(); engineGain.disconnect(); engineOsc=null; engineGain=null; } }catch(e){}
}
function setEngineFreq(f){
  try{ if(engineOsc) engineOsc.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.1); }catch(e){}
}
function beep(freq, dur, type, vol){
  var a = ensureAudio(); if(!a) return;
  try{
    var o = a.createOscillator(), g = a.createGain();
    o.type = type||'square'; o.frequency.value = freq;
    g.gain.value = vol||0.1;
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + (dur||0.1));
    o.connect(g).connect(a.destination);
    o.start(); o.stop(a.currentTime + (dur||0.1) + 0.02);
  }catch(e){}
}
function crashSound(){
  var a = ensureAudio(); if(!a) return;
  try{
    var buf = a.createBuffer(1, a.sampleRate*0.6, a.sampleRate);
    var d = buf.getChannelData(0);
    for(var i=0;i<d.length;i++){ d[i] = (Math.random()*2-1) * (1 - i/d.length); }
    var s = a.createBufferSource(); s.buffer = buf;
    var g = a.createGain(); g.gain.value = 0.4;
    s.connect(g).connect(a.destination); s.start();
  }catch(e){}
}

function initScene(){
  renderer = new THREE_.WebGLRenderer({canvas:canvas, antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  renderer.setClearColor(0x66aaff);

  scene = new THREE_.Scene();
  scene.fog = new THREE_.Fog(0x66aaff, 60, 250);

  camera = new THREE_.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 500);
  camera.position.set(0, 6, -10);
  camera.lookAt(0, 1, 20);

  var hemi = new THREE_.HemisphereLight(0xffffff, 0x334455, 0.9);
  scene.add(hemi);
  var dir = new THREE_.DirectionalLight(0xffffff, 0.7);
  dir.position.set(5, 10, 3); scene.add(dir);

  // Ground (grass)
  var grass = new THREE_.Mesh(
    new THREE_.PlaneGeometry(400, 2000),
    new THREE_.MeshLambertMaterial({color:0x2f8f3f})
  );
  grass.rotation.x = -Math.PI/2;
  grass.position.set(0, -0.01, 900);
  scene.add(grass);

  // Road (moving via texture-less: we scroll dashed lines)
  road = new THREE_.Group();
  var roadMesh = new THREE_.Mesh(
    new THREE_.PlaneGeometry(roadWidth, 2000),
    new THREE_.MeshLambertMaterial({color:0x1a1a1a})
  );
  roadMesh.rotation.x = -Math.PI/2;
  roadMesh.position.set(0, 0, 900);
  scene.add(roadMesh);

  // Lane dashes as separate meshes (recycled)
  for(var i=0;i<40;i++){
    var d = new THREE_.Mesh(new THREE_.PlaneGeometry(0.3, 3),
      new THREE_.MeshBasicMaterial({color:0xffffff}));
    d.rotation.x = -Math.PI/2;
    d.position.set(-2, 0.02, i*10);
    d.userData.baseZ = i*10;
    scene.add(d);
    road.userData = road.userData || {};
    (road.userData.dashesL = road.userData.dashesL || []).push(d);

    var d2 = new THREE_.Mesh(new THREE_.PlaneGeometry(0.3, 3),
      new THREE_.MeshBasicMaterial({color:0xffffff}));
    d2.rotation.x = -Math.PI/2;
    d2.position.set(2, 0.02, i*10);
    scene.add(d2);
    (road.userData.dashesR = road.userData.dashesR || []).push(d2);
  }
  // Road edges
  for(var s=-1;s<=1;s+=2){
    var edge = new THREE_.Mesh(new THREE_.PlaneGeometry(0.3, 2000),
      new THREE_.MeshBasicMaterial({color:0xffff66}));
    edge.rotation.x = -Math.PI/2;
    edge.position.set(s*roadWidth/2, 0.02, 900);
    scene.add(edge);
  }
  scene.add(road);

  // Player car
  playerCar = makeCar(0xff3322);
  playerCar.position.set(0, 0, 0);
  scene.add(playerCar);
}

function makeCar(color){
  var g = new THREE_.Group();
  var body = new THREE_.Mesh(
    new THREE_.BoxGeometry(2, 0.8, 4),
    new THREE_.MeshLambertMaterial({color:color})
  );
  body.position.y = 0.6;
  g.add(body);
  var cabin = new THREE_.Mesh(
    new THREE_.BoxGeometry(1.6, 0.6, 2),
    new THREE_.MeshLambertMaterial({color:0x223344})
  );
  cabin.position.set(0, 1.3, -0.2);
  g.add(cabin);
  // wheels
  for(var xs=-1;xs<=1;xs+=2){
    for(var zs=-1;zs<=1;zs+=2){
      var w = new THREE_.Mesh(new THREE_.CylinderGeometry(0.35,0.35,0.3,10),
        new THREE_.MeshLambertMaterial({color:0x111111}));
      w.rotation.z = Math.PI/2;
      w.position.set(xs*1.05, 0.35, zs*1.3);
      g.add(w);
    }
  }
  return g;
}

function spawnObstacle(){
  var lane = laneX[Math.floor(Math.random()*3)];
  var colors = [0x2266dd, 0xffaa22, 0x22aa66, 0x9944cc, 0xdddddd];
  var car = makeCar(colors[Math.floor(Math.random()*colors.length)]);
  car.position.set(lane, 0, playerCar.position.z + 180 + Math.random()*40);
  car.userData.spd = 5 + Math.random()*10;
  scene.add(car);
  obstacles.push(car);
}
function spawnPowerup(){
  var lane = laneX[Math.floor(Math.random()*3)];
  var m = new THREE_.Mesh(
    new THREE_.BoxGeometry(1.2,1.2,1.2),
    new THREE_.MeshLambertMaterial({color:0x33ccff, emissive:0x1166aa})
  );
  m.position.set(lane, 1, playerCar.position.z + 160 + Math.random()*40);
  scene.add(m);
  powerups.push(m);
}

function resetGame(){
  // remove obstacles/powerups
  for(var i=0;i<obstacles.length;i++) scene.remove(obstacles[i]);
  for(var j=0;j<powerups.length;j++) scene.remove(powerups[j]);
  obstacles = []; powerups = [];
  score = 0; elapsed = 0; speed = baseSpeed = 40;
  spawnTimer = 0; puTimer = 0; shakeT = 0; shieldT = 0;
  playerCar.position.set(0,0,0);
  playerCar.rotation.set(0,0,0);
  playerCar.visible = true;
  camera.position.set(0, 6, -10);
  camera.lookAt(0, 1, 20);
}

function startGame(){
  if(state === 'play') return;
  resetGame();
  state = 'play';
  startEl.classList.add('hidden');
  overEl.classList.add('hidden');
  uiEl.classList.remove('hidden');
  ensureAudio();
  startEngine();
}

function gameOver(){
  if(state !== 'play') return;
  state = 'over';
  stopEngine();
  crashSound();
  shakeT = 0.6; shakeAmp = 1.2;
  // explosion: quick red flash sphere
  var ex = new THREE_.Mesh(new THREE_.SphereGeometry(2, 12, 12),
    new THREE_.MeshBasicMaterial({color:0xffaa00, transparent:true, opacity:0.9}));
  ex.position.copy(playerCar.position); ex.position.y = 1;
  scene.add(ex);
  var t0 = performance.now();
  (function anim(){
    var dt = (performance.now()-t0)/1000;
    if(dt > 0.8){ scene.remove(ex); return; }
    ex.scale.setScalar(1 + dt*4);
    ex.material.opacity = Math.max(0, 0.9 - dt);
    requestAnimationFrame(anim);
  })();
  playerCar.visible = false;
  finalEl.textContent = Math.floor(score);
  setTimeout(function(){
    overEl.classList.remove('hidden');
    uiEl.classList.add('hidden');
  }, 700);
}

var last = 0;
function loop(now){
  requestAnimationFrame(loop);
  var dt = Math.min(0.05, (now-last)/1000 || 0);
  last = now;

  if(state === 'play'){
    elapsed += dt;
    // Difficulty ramp: speed and spawn rate increase visibly within 60s
    speed = baseSpeed + Math.min(elapsed*1.5, 80); // up to +80 over ~53s
    var spawnInterval = Math.max(0.35, 1.4 - elapsed*0.02);

    // Move player forward (in world Z)
    playerCar.position.z += speed * dt;

    // Steering
    var steer = 0;
    if(keys['ArrowLeft'] || keys['KeyA']) steer -= 1;
    if(keys['ArrowRight'] || keys['KeyD']) steer += 1;
    playerCar.position.x += steer * 12 * dt;
    playerCar.position.x = Math.max(-roadWidth/2 + 1, Math.min(roadWidth/2 - 1, playerCar.position.x));
    playerCar.rotation.y = -steer * 0.15;

    // Accelerate/brake (subtle)
    var accel = 0;
    if(keys['ArrowUp'] || keys['KeyW']) accel += 1;
    if(keys['ArrowDown'] || keys['KeyS']) accel -= 1;
    speed += accel * 10 * dt;
    speed = Math.max(20, speed);
    setEngineFreq(60 + speed*2);

    // Camera follow
    var camTargetX = playerCar.position.x * 0.5;
    camera.position.x += (camTargetX - camera.position.x) * Math.min(1, dt*4);
    camera.position.z = playerCar.position.z - 10;
    camera.position.y = 6;
    // shake
    if(shakeT>0){
      shakeT -= dt;
      camera.position.x += (Math.random()-.5)*shakeAmp;
      camera.position.y += (Math.random()-.5)*shakeAmp;
    }
    camera.lookAt(playerCar.position.x, 1, playerCar.position.z + 15);

    // Spawn obstacles
    spawnTimer += dt;
    if(spawnTimer > spawnInterval){
      spawnTimer = 0;
      spawnObstacle();
    }
    // Ensure at least 3 on screen
    while(obstacles.length < 3) spawnObstacle();

    // Spawn powerups occasionally
    puTimer += dt;
    if(puTimer > 8){ puTimer = 0; spawnPowerup(); }

    // Update obstacles
    for(var i=obstacles.length-1;i>=0;i--){
      var o = obstacles[i];
      o.position.z += o.userData.spd * dt; // slow forward motion
      if(o.position.z < playerCar.position.z - 30){
        scene.remove(o); obstacles.splice(i,1); continue;
      }
      // Collision (AABB-ish)
      var dx = Math.abs(o.position.x - playerCar.position.x);
      var dz = Math.abs(o.position.z - playerCar.position.z);
      if(dx < 2 && dz < 3.8){
        if(shieldT > 0){
          // bounce it away
          scene.remove(o); obstacles.splice(i,1);
          beep(200, 0.1, 'square', 0.15);
        } else {
          gameOver();
          return;
        }
      }
    }
    // Powerups
    for(var k=powerups.length-1;k>=0;k--){
      var p = powerups[k];
      p.rotation.y += dt*2;
      if(p.position.z < playerCar.position.z - 30){
        scene.remove(p); powerups.splice(k,1); continue;
      }
      var dx2 = Math.abs(p.position.x - playerCar.position.x);
      var dz2 = Math.abs(p.position.z - playerCar.position.z);
      if(dx2 < 2 && dz2 < 2){
        shieldT = 6;
        scene.remove(p); powerups.splice(k,1);
        beep(880, 0.15, 'sine', 0.2);
        setTimeout(function(){beep(1320,0.15,'sine',0.2);}, 100);
      }
    }
    // Shield visual: tint car
    if(shieldT>0){
      shieldT -= dt;
      var c = playerCar.children[0]; // body
      c.material.emissive = new THREE_.Color(0x2266aa);
      puEl.classList.remove('hidden');
      puEl.textContent = 'SHIELD ' + shieldT.toFixed(1) + 's';
    } else {
      playerCar.children[0].material.emissive = new THREE_.Color(0x000000);
      puEl.classList.add('hidden');
    }

    // Scroll dashes (recycle by position)
    var ldash = road.userData.dashesL, rdash = road.userData.dashesR;
    for(var m=0;m<ldash.length;m++){
      if(ldash[m].position.z < playerCar.position.z - 20){
        ldash[m].position.z += ldash.length*10;
        rdash[m].position.z += ldash.length*10;
      }
    }

    // Score
    score += dt * speed * 0.5;
    scoreEl.textContent = 'Score: ' + Math.floor(score) + '  Speed: ' + Math.floor(speed);

    // Score blip occasionally
    if(Math.floor(score) % 100 === 0 && Math.floor(score) > 0 && !loop._lastBlip || (loop._lastBlip !== Math.floor(score/100))){
      if(Math.floor(score) > 0 && Math.floor(score/100) !== loop._lastBlip){
        loop._lastBlip = Math.floor(score/100);
        beep(660, 0.08, 'triangle', 0.08);
      }
    }
  } else if(state === 'over'){
    if(shakeT>0){
      shakeT -= dt;
      camera.position.x += (Math.random()-.5)*shakeAmp*0.5;
      camera.position.y += (Math.random()-.5)*shakeAmp*0.5;
    }
  }

  renderer.render(scene, camera);
}

function onResize(){
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
}

window.addEventListener('keydown', function(e){
  keys[e.code] = true;
  if(state === 'start'){ startGame(); }
  else if(state === 'over' && (e.code === 'KeyR' || e.code === 'Enter' || e.code === 'Space')){ startGame(); }
});
window.addEventListener('keyup', function(e){ keys[e.code] = false; });
document.getElementById('startBtn').addEventListener('click', function(e){ e.stopPropagation(); startGame(); });
document.getElementById('againBtn').addEventListener('click', function(e){ e.stopPropagation(); startGame(); });
startEl.addEventListener('click', function(){ if(state==='start') startGame(); });
overEl.addEventListener('click', function(){ if(state==='over') startGame(); });
window.addEventListener('resize', onResize);

try {
  initScene();
  requestAnimationFrame(loop);
} catch(e){
  // swallow — never console.error
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:20px;';
  d.textContent = 'Init failed: ' + (e && e.message);
  document.body.appendChild(d);
}
</script>
</body>
</html>
