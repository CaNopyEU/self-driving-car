<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Neon Rush 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #game-canvas { display: block; width: 100vw; height: 100vh; }
        
        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            pointer-events: none; z-index: 10;
            display: none;
        }
        #hud-score {
            position: absolute; top: 20px; right: 30px;
            color: #0ff; font-size: 28px; text-shadow: 0 0 10px #0ff;
        }
        #hud-speed {
            position: absolute; top: 20px; left: 30px;
            color: #0f0; font-size: 20px; text-shadow: 0 0 8px #0f0;
        }
        #hud-level {
            position: absolute; top: 55px; left: 30px;
            color: #ff0; font-size: 16px; text-shadow: 0 0 8px #ff0;
        }
        #hud-combo {
            position: absolute; top: 55px; right: 30px;
            color: #f0f; font-size: 18px; text-shadow: 0 0 8px #f0f;
            opacity: 0; transition: opacity 0.3s;
        }
        #hud-lives {
            position: absolute; top: 85px; left: 30px;
            color: #f44; font-size: 16px; text-shadow: 0 0 8px #f44;
        }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; background: rgba(0,0,0,0.85);
        }
        .overlay h1 {
            font-size: 64px; color: #0ff; text-shadow: 0 0 30px #0ff, 0 0 60px #08f;
            margin-bottom: 20px; letter-spacing: 8px;
        }
        .overlay h2 {
            font-size: 28px; color: #f0f; text-shadow: 0 0 15px #f0f;
            margin-bottom: 30px;
        }
        .overlay p {
            color: #aaa; font-size: 16px; margin: 5px 0; line-height: 1.6;
        }
        .overlay .start-btn {
            margin-top: 30px; padding: 15px 50px; font-size: 22px;
            background: transparent; border: 2px solid #0ff; color: #0ff;
            cursor: pointer; font-family: inherit; letter-spacing: 3px;
            transition: all 0.2s; pointer-events: all;
        }
        .overlay .start-btn:hover {
            background: #0ff; color: #000; box-shadow: 0 0 30px #0ff;
        }
        #game-over-screen .final-score { font-size: 48px; color: #0ff; margin: 10px 0; }
        #game-over-screen .high-score { font-size: 20px; color: #ff0; margin-bottom: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div id="hud">
        <div id="hud-score">0</div>
        <div id="hud-speed">0 km/h</div>
        <div id="hud-level">LEVEL 1</div>
        <div id="hud-combo"></div>
        <div id="hud-lives"></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>NEON RUSH</h1>
        <h2>3D</h2>
        <p>Arrow Keys / WASD to drive</p>
        <p>Dodge traffic, pass cars, survive as long as you can</p>
        <p>Near-misses give combo bonus points!</p>
        <button class="start-btn" id="start-btn">PRESS ENTER TO RACE</button>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <h1>WRECKED</h1>
        <div class="final-score" id="final-score">0</div>
        <div class="high-score" id="high-score"></div>
        <p>Cars passed: <span id="cars-passed">0</span></p>
        <p>Max combo: <span id="max-combo">0</span></p>
        <button class="start-btn" id="restart-btn">PRESS ENTER TO RETRY</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
