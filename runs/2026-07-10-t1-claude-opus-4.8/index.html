<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>NEON RUSH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameWrap">
        <canvas id="gameCanvas"></canvas>

        <button id="muteBtn" title="Toggle sound">🔊</button>

        <!-- START SCREEN -->
        <div id="startScreen" class="overlay">
            <div class="panel">
                <h1 class="logo">NEON<span>RUSH</span></h1>
                <p class="tag">Outrun the grid. Dodge the traffic. Chase the rivals.</p>
                <button id="startBtn" class="bigBtn">DRIVE ▶</button>
                <div class="hi">HIGH SCORE&nbsp;·&nbsp;<b id="startHigh">0</b></div>
                <div class="controls">
                    <div class="ctitle">CONTROLS</div>
                    <div class="crow"><span class="key">← →</span> / <span class="key">A D</span> steer</div>
                    <div class="crow"><span class="key">↑</span> / <span class="key">W</span> accelerate &nbsp;·&nbsp; <span class="key">↓</span> / <span class="key">S</span> brake</div>
                    <div class="crow"><span class="key">SHIFT</span> boost (uses fuel)</div>
                </div>
            </div>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="gameOverScreen" class="overlay hidden">
            <div class="panel">
                <h1 class="gover">WRECKED</h1>
                <div id="newBest" class="newbest">★ NEW BEST ★</div>
                <div class="stats">
                    <div class="stat"><span>SCORE</span><b id="finalScore">0</b></div>
                    <div class="stat"><span>WAVE</span><b id="finalWave">1</b></div>
                    <div class="stat"><span>BEST</span><b id="finalHigh">0</b></div>
                </div>
                <button id="restartBtn" class="bigBtn">RETRY ↺</button>
                <div class="hint">press ENTER to restart</div>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="sound.js"></script>
    <script src="network.js"></script>
    <script src="sensor.js"></script>
    <script src="road.js"></script>
    <script src="controls.js"></script>
    <script src="car.js"></script>
    <script src="game.js"></script>
</body>
</html>
